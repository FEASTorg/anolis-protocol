syntax = "proto3";

package anolis.deviceprovider.v1;

// Status is returned in every Response and conveys success or failure.
message Status {
  // Code enumerates all structured error categories for ADPP responses.
  enum Code {
    CODE_UNSPECIFIED = 0;
    CODE_OK = 1;

    CODE_INVALID_ARGUMENT = 10;
    CODE_NOT_FOUND = 11;
    CODE_FAILED_PRECONDITION = 12;
    CODE_OUT_OF_RANGE = 13;
    CODE_UNIMPLEMENTED = 14;

    CODE_DEADLINE_EXCEEDED = 20;
    CODE_UNAVAILABLE = 21;
    CODE_RESOURCE_EXHAUSTED = 22;

    CODE_INTERNAL = 30;
    CODE_DATA_LOSS = 31;
  }

  // The result code for this response.
  Code code = 1;
  // Human-readable description of the result, especially on error.
  string message = 2;
  // Structured diagnostic key-value pairs for programmatic inspection.
  map<string, string> details = 3;
}
